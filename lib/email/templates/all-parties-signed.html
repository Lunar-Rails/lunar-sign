<table role="presentation" cellspacing="0" cellpadding="0" border="0" width="100%">
  <!-- Greeting -->
  <tr>
    <td style="font-size: 15px; color: #e8e6f0; font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Arial, sans-serif; line-height: 1.6; padding-bottom: 20px;">
      <p style="margin: 0 0 14px;">Hello <strong style="color: #e8e6f0;">{{signerName}}</strong>,</p>
      <p style="margin: 0;">All parties have now signed <strong style="color: #e8e6f0;">{{documentTitle}}</strong>. Thank you for your signature.</p>
    </td>
  </tr>

  <!-- Completion notice -->
  <tr>
    <td style="padding-bottom: 8px;">
      <table role="presentation" cellspacing="0" cellpadding="0" border="0" width="100%" class="info-box" style="background-color: #1a1a30; border-radius: 10px; border-left: 3px solid #3ccbda;">
        <tr>
          <td style="padding: 16px 20px; font-size: 14px; color: #b8b4c8; font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Arial, sans-serif; line-height: 1.6;">
            <span style="font-size: 14px; font-weight: 600; color: #3ccbda; font-family: 'Space Grotesk', 'Segoe UI', Arial, sans-serif;">&#10003;&nbsp; Signing complete</span><br />
            <span style="font-size: 13px; color: #7e7a92; margin-top: 4px; display: block;">The document has been executed by all parties.</span>
          </td>
        </tr>
      </table>
    </td>
  </tr>
</table>
