<table role="presentation" cellspacing="0" cellpadding="0" border="0" width="100%">
  <!-- Greeting -->
  <tr>
    <td style="font-size: 15px; color: #e8e6f0; font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Arial, sans-serif; line-height: 1.6; padding-bottom: 20px;">
      <p style="margin: 0 0 14px;">Hello,</p>
      <p style="margin: 0;"><strong style="color: #e8e6f0;">{{inviterName}}</strong> has invited <strong style="color: #e8e6f0;">{{inviteeEmail}}</strong> to join Lunar Sign.</p>
    </td>
  </tr>

  <!-- Role info box -->
  <tr>
    <td style="padding-bottom: 24px;">
      <table role="presentation" cellspacing="0" cellpadding="0" border="0" width="100%" class="info-box" style="background-color: #1a1a30; border-radius: 10px; border-left: 3px solid #7c5cfc;">
        <tr>
          <td style="padding: 16px 20px; font-size: 14px; color: #b8b4c8; font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Arial, sans-serif; line-height: 1.8;">
            <span style="font-family: 'Space Grotesk', 'Segoe UI', Arial, sans-serif; font-size: 11px; font-weight: 600; color: #7e7a92; text-transform: uppercase; letter-spacing: 0.08em;">Workspace role</span><br />
            <span style="font-size: 15px; font-weight: 600; color: #e8e6f0; font-family: 'Space Grotesk', 'Segoe UI', Arial, sans-serif;">{{roleLabel}}</span>
          </td>
        </tr>
      </table>
    </td>
  </tr>

  <!-- CTA copy -->
  <tr>
    <td style="font-size: 15px; color: #b8b4c8; font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Arial, sans-serif; line-height: 1.6; padding-bottom: 28px;">
      <p style="margin: 0;">Use Google sign-in with this email address to activate your access:</p>
    </td>
  </tr>

  <!-- CTA button -->
  <tr>
    <td class="button-td" align="center" style="text-align: center; padding-bottom: 28px;">
      <!--[if mso]>
      <v:roundrect xmlns:v="urn:schemas-microsoft-com:vml" xmlns:w="urn:schemas-microsoft-com:office:word" href="{{loginUrl}}" style="height:44px;v-text-anchor:middle;width:200px;" arcsize="23%" strokeweight="0" fillcolor="#7c5cfc">
        <w:anchorlock/>
        <center style="color:#ffffff;font-family:'Segoe UI',sans-serif;font-size:15px;font-weight:600;">Join Workspace</center>
      </v:roundrect>
      <![endif]-->
      <!--[if !mso]><!-->
      <a href="{{loginUrl}}" class="button-a" target="_blank" style="display: inline-block; background-color: #7c5cfc; color: #ffffff; font-size: 15px; font-weight: 600; font-family: 'Space Grotesk', 'Segoe UI', Arial, sans-serif; text-decoration: none; padding: 12px 32px; border-radius: 10px; text-align: center; letter-spacing: -0.1px;">
        Join Workspace
      </a>
      <!--<![endif]-->
    </td>
  </tr>

  <!-- Disclaimer -->
  <tr>
    <td style="font-size: 13px; color: #7e7a92; font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Arial, sans-serif; line-height: 1.6; border-top: 1px solid #2a2750; padding-top: 20px;">
      <p style="margin: 0;">If you were not expecting this invitation, you can safely ignore this email.</p>
    </td>
  </tr>
</table>
