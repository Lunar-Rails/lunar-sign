<table role="presentation" cellspacing="0" cellpadding="0" border="0" width="100%">
  <tr>
    <td style="font-size: 16px; color: #1a202c; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif; line-height: 1.6;">
      <p style="margin: 0 0 16px;">Hello {{ownerName}},</p>
      <p style="margin: 0 0 16px;">{{signerName}} has signed your document.</p>
    </td>
  </tr>
  <tr>
    <td style="padding: 0 0 16px;">
      <table role="presentation" cellspacing="0" cellpadding="0" border="0" width="100%" class="info-box" style="background-color: #f0fdf4; border-left: 4px solid #22c55e; border-radius: 0 6px 6px 0;">
        <tr>
          <td style="padding: 16px; font-size: 15px; color: #374151; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif; line-height: 1.6;">
            <strong style="color: #1a202c;">Document:</strong> {{documentTitle}}<br />
            <strong style="color: #1a202c;">Signed by:</strong> {{signerName}}
          </td>
        </tr>
      </table>
    </td>
  </tr>
  <tr>
    <td class="button-td" align="center" style="text-align: center; padding: 0 0 8px;">
      <!--[if mso]>
      <v:roundrect xmlns:v="urn:schemas-microsoft-com:vml" xmlns:w="urn:schemas-microsoft-com:office:word" href="{{documentUrl}}" style="height:48px;v-text-anchor:middle;width:220px;" arcsize="10%" strokeweight="0" fillcolor="#2563eb">
        <w:anchorlock/>
        <center style="color:#ffffff;font-family:sans-serif;font-size:16px;font-weight:bold;">View Document</center>
      </v:roundrect>
      <![endif]-->
      <!--[if !mso]><!-->
      <a href="{{documentUrl}}" class="button-a" target="_blank" style="display: inline-block; background-color: #2563eb; color: #ffffff; font-size: 16px; font-weight: 600; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif; text-decoration: none; padding: 12px 32px; border-radius: 6px; text-align: center;">
        View Document
      </a>
      <!--<![endif]-->
    </td>
  </tr>
</table>
