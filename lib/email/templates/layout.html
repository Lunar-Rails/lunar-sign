<!DOCTYPE html>
<html xmlns="http://www.w3.org/1999/xhtml" lang="en">
<head>
  <meta http-equiv="Content-Type" content="text/html; charset=UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="color-scheme" content="dark" />
  <meta name="supported-color-schemes" content="dark" />
  <title>{{subject}}</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet" />
  <!--[if mso]>
  <noscript>
    <xml>
      <o:OfficeDocumentSettings>
        <o:PixelsPerInch>96</o:PixelsPerInch>
      </o:OfficeDocumentSettings>
    </xml>
  </noscript>
  <![endif]-->
  <style type="text/css">
    /* Reset */
    body, table, td, a { -webkit-text-size-adjust: 100%; -ms-text-size-adjust: 100%; }
    table, td { mso-table-lspace: 0pt; mso-table-rspace: 0pt; }
    img { -ms-interpolation-mode: bicubic; border: 0; height: auto; line-height: 100%; outline: none; text-decoration: none; }
    body { height: 100% !important; margin: 0 !important; padding: 0 !important; width: 100% !important; }
    a[x-apple-data-detectors] { color: inherit !important; text-decoration: none !important; font-size: inherit !important; font-family: inherit !important; font-weight: inherit !important; line-height: inherit !important; }

    /* Base */
    body {
      background-color: #0d0f1a;
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
      font-size: 15px;
      line-height: 1.6;
      color: #e8e6f0;
      margin: 0;
      padding: 0;
    }

    /* Responsive */
    @media only screen and (max-width: 620px) {
      .email-container { width: 100% !important; max-width: 100% !important; }
      .email-content { padding: 24px 20px !important; }
      .email-header { padding: 24px 20px !important; }
      .email-footer { padding: 20px 20px !important; }
      .button-td { padding: 16px 0 !important; text-align: center !important; }
      .button-a { width: 90% !important; font-size: 15px !important; padding: 13px 20px !important; }
      .info-box { padding: 14px !important; }
    }
  </style>
</head>
<body style="background-color: #0d0f1a; margin: 0; padding: 0;">
  <!-- Visually hidden preheader -->
  <div style="display: none; font-size: 1px; color: #0d0f1a; line-height: 1px; max-height: 0; max-width: 0; opacity: 0; overflow: hidden;">
    {{preheader}}
  </div>

  <!-- Outer wrapper -->
  <table role="presentation" cellspacing="0" cellpadding="0" border="0" width="100%" style="background-color: #0d0f1a;">
    <tr>
      <td style="padding: 36px 16px;">
        <!-- Email container -->
        <table role="presentation" cellspacing="0" cellpadding="0" border="0" width="600" align="center" class="email-container" style="max-width: 600px; width: 100%; background-color: #12142a; border-radius: 14px; overflow: hidden; border: 1px solid #2a2750;">

          <!-- Header -->
          <tr>
            <td class="email-header" style="padding: 28px 40px 22px; border-bottom: 1px solid #2a2750; background-color: #0f1022;">
              <table role="presentation" cellspacing="0" cellpadding="0" border="0" width="100%">
                <tr>
                  <td>
                    <!-- Logo -->
                    <table role="presentation" cellspacing="0" cellpadding="0" border="0">
                      <tr>
                        <td style="vertical-align: middle;">
                          <!-- Violet dot -->
                          <div style="display: inline-block; width: 8px; height: 8px; background-color: #7c5cfc; border-radius: 50%; margin-right: 10px; vertical-align: middle;"></div>
                        </td>
                        <td style="vertical-align: middle;">
                          <span style="font-family: 'Space Grotesk', 'Segoe UI', Arial, sans-serif; font-size: 20px; font-weight: 700; color: #e8e6f0; letter-spacing: -0.3px;">Lunar</span><span style="font-family: 'Space Grotesk', 'Segoe UI', Arial, sans-serif; font-size: 20px; font-weight: 700; color: #7c5cfc; letter-spacing: -0.3px;"> Sign</span>
                        </td>
                      </tr>
                    </table>
                  </td>
                </tr>
              </table>
            </td>
          </tr>

          <!-- Body -->
          <tr>
            <td class="email-content" style="padding: 36px 40px;">
              {{content}}
            </td>
          </tr>

          <!-- Footer -->
          <tr>
            <td class="email-footer" style="padding: 22px 40px; border-top: 1px solid #2a2750; background-color: #0a0c18;">
              <table role="presentation" cellspacing="0" cellpadding="0" border="0" width="100%">
                <tr>
                  <td style="text-align: center; font-size: 12px; color: #7e7a92; font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Arial, sans-serif; line-height: 1.6;">
                    <strong style="color: #b8b4c8; font-family: 'Space Grotesk', 'Segoe UI', Arial, sans-serif;">Lunar Sign</strong> &mdash; Lunar Rails<br />
                    This is an automated message, please do not reply to this email.
                  </td>
                </tr>
              </table>
            </td>
          </tr>

        </table>
      </td>
    </tr>
  </table>
</body>
</html>
