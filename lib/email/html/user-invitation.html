<!-- Body content for user invitation email -->
<table role="presentation" cellspacing="0" cellpadding="0" border="0" width="100%">
  <tr>
    <td style="font-size: 16px; color: #171717; padding-bottom: 16px;">
      Hello,
    </td>
  </tr>
  <tr>
    <td style="font-size: 16px; color: #374151; padding-bottom: 20px;">
      {{inviterName}} has invited <strong>{{inviteeEmail}}</strong> to join Lunar Sign.
    </td>
  </tr>

  <!-- Invite info card -->
  <tr>
    <td style="padding-bottom: 24px;">
      <table role="presentation" cellspacing="0" cellpadding="0" border="0" width="100%" style="background-color: #f9fafb; border-radius: 6px; border: 1px solid #e5e7eb;">
        <tr>
          <td style="padding: 16px 20px;">
            <table role="presentation" cellspacing="0" cellpadding="0" border="0" width="100%">
              <tr>
                <td style="font-size: 14px; color: #374151;">
                  <span style="color: #6b7280;">Workspace role:</span>&nbsp;
                  <strong style="color: #171717;">{{roleLabel}}</strong>
                </td>
              </tr>
            </table>
          </td>
        </tr>
      </table>
    </td>
  </tr>

  <tr>
    <td style="font-size: 16px; color: #374151; padding-bottom: 24px;">
      Use Google sign-in with this email to activate your access:
    </td>
  </tr>

  <!-- CTA button -->
  <tr>
    <td style="padding-bottom: 24px;">
      <table role="presentation" cellspacing="0" cellpadding="0" border="0">
        <tr>
          <td style="border-radius: 6px; background-color: #2563eb;">
            <a href="{{loginUrl}}" target="_blank" style="display: inline-block; padding: 14px 28px; font-size: 16px; font-weight: 600; color: #ffffff; text-decoration: none; border-radius: 6px; background-color: #2563eb;">
              <!--[if mso]><i style="mso-font-width: -100%; mso-text-raise: 21pt;">&nbsp;</i><![endif]-->
              <span style="mso-text-raise: 10pt;">Join Workspace</span>
              <!--[if mso]><i style="mso-font-width: -100%;">&nbsp;</i><![endif]-->
            </a>
          </td>
        </tr>
      </table>
    </td>
  </tr>
</table>
