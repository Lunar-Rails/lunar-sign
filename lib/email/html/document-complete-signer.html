<!-- Body content for document complete notification to individual signers -->
<table role="presentation" cellspacing="0" cellpadding="0" border="0" width="100%">
  <tr>
    <td style="font-size: 16px; color: #171717; padding-bottom: 16px;">
      Hello {{signerName}},
    </td>
  </tr>
  <tr>
    <td style="font-size: 16px; color: #374151; padding-bottom: 20px;">
      All parties have now signed <strong>{{documentTitle}}</strong>.
    </td>
  </tr>

  <!-- Completion info card -->
  <tr>
    <td style="padding-bottom: 24px;">
      <table role="presentation" cellspacing="0" cellpadding="0" border="0" width="100%" style="background-color: #f0fdf4; border-radius: 6px; border-left: 4px solid #22c55e;">
        <tr>
          <td style="padding: 16px 20px;">
            <table role="presentation" cellspacing="0" cellpadding="0" border="0" width="100%">
              <tr>
                <td style="font-size: 14px; color: #374151;">
                  <span style="color: #6b7280;">Status:</span>&nbsp;
                  <strong style="color: #16a34a;">Complete</strong>
                </td>
              </tr>
            </table>
          </td>
        </tr>
      </table>
    </td>
  </tr>

  <tr>
    <td style="font-size: 16px; color: #374151;">
      Thank you for signing.
    </td>
  </tr>
</table>
